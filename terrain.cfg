#textdomain wesnoth-loi
[editor_group]
	id = "wesnoth-UMC-LoI"
	name = _ "Legends of Idaamub (custom terrains)"
	icon = "group_custom"
[/editor_group]

{NEW:FOREST             *^Zfx            (C*,K*,X*,Q*,W*,Ai,M*,*^V*,*^B*)    forest/pine}

{NEW:FOREST             *^Zfa            (C*,K*,X*,Q*,W*,Ai,M*,*^V*,*^B*)    forest/mixed-winter-snow}

{NEW:OVERLAY             *^FYnt  embellishments/fountain-0.png:150,embellishments/fountain-1.png:150,embellishments/fountain-0a.png:150,embellishments/fountain-1a.png:100,embellishments/fountain-0a.png:150,embellishments/fountain-0.png:150,embellishments/fountain-0a.png:150,embellishments/fountain-1.png:100,embellishments/fountain-0.png:100,embellishments/fountain-0a.png:100,embellishments/fountain-1.png:150,embellishments/fountain-0.png:150,embellishments/fountain-2.png:150}

{NEW:BASE_P          WufZ                                    10                 ford-c2}
{NEW:BASE            WufZ                                                       ford-c}

# Desert bridges -  for now they don't tile
# these are also on a different layer than the rest of bridges, maybe too low

{NEW:OVERLAY             *^Bxd\                                                     desert-bridge-se-nw       FLAG=bridge LAYER=-80}
{NEW:OVERLAY             *^Bxd|                                                     desert-bridge-s-n         FLAG=bridge LAYER=-80}
{NEW:OVERLAY             *^Bxd/                                                     desert-bridge-sw-ne       FLAG=bridge LAYER=-80}

[terrain_type]
	symbol_image=forest/pine-tile
	id=dense-forest
#textdomain wesnoth-help
	name= _ "Forest"
#textdomain wesnoth-loi
	editor_name= _ "Dense Forest"
	string=^Zfx
	aliasof=_bas,Xt
	mvt_alias=-,_bas,Xt
	editor_group=wesnoth-UMC-LoI
[/terrain_type]

[terrain_type]
	symbol_image=forest/mixed-winter-snow-tile
	id=dense-winter-forest
#textdomain wesnoth-help
	name= _ "Forest"
#textdomain wesnoth-loi
	editor_name= _ "Dense Winter Forest"
	string=^Zfa
	aliasof=_bas,Xt
	mvt_alias=-,_bas,Xt
	editor_group=wesnoth-UMC-LoI
[/terrain_type]

[terrain_type]
    symbol_image=embellishments/fountain-tile
    id=fountain
    name=_ "Fountain of Youth"
    string=^FYnt
    default_base=Rrc
    aliasof=_bas,Gt
	heals=8
	gives_income=false
    editor_group=wesnoth-UMC-LoI, embellishments
[/terrain_type]

[terrain_type]
    symbol_image=water/cave/ford-c
    id=Ford_cave
#textdomain wesnoth-lib
    name= _ "Ford"
#textdomain wesnoth-loi
    editor_name= _ "Cave Ford"
    string=WufZ
    aliasof=Gt, Wst
    submerge=0.3
    unit_height_adjust=-4
    editor_group=wesnoth-UMC-LoI, cave, water
[/terrain_type]

#  ######## Desert Bridge

[terrain_type]
    symbol_image=desert-bridge-s-n-tile
    id=bridgedesert
    name= _ "Bridge"
    editor_name= _ "Desert Bridge"
    string=^Bxd|
    aliasof=Dd,_bas
    submerge=0
    default_base=Qxu
    editor_group=wesnoth-UMC-LoI, bridge, flat
[/terrain_type]

[terrain_type]
    symbol_image=desert-bridge-sw-ne-tile
    id=bridgedesertdiag1
    name= _ "Bridge"
    editor_name= _ "Desert Bridge"
    unit_height_adjust=22
    string=^Bxd/
    aliasof=Dd,_bas
    submerge=0
    default_base=Qxu
    editor_group=wesnoth-UMC-LoI, bridge, flat
    hide_help=yes
[/terrain_type]

[terrain_type]
    symbol_image=desert-bridge-se-nw-tile
    id=bridgedesertdiag2
    name= _ "Bridge"
    editor_name= _ "Desert Bridge"
    unit_height_adjust=22
    string=^Bxd\
    aliasof=Dd,_bas
    submerge=0
    default_base=Qxu
    editor_group=wesnoth-UMC-LoI, bridge, flat
    hide_help=yes
[/terrain_type]