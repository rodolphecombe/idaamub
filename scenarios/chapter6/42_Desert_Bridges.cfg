#textdomain wesnoth-loi
[scenario]
	id="42_Desert_Bridges"
	name= _ "Desert Bridges"
	map_data="{~add-ons/Legends_of_Idaamub/maps/42_Desert_Bridges.map}"
	victory_when_enemies_defeated=no
	next_scenario=43_Western_Village

	{TURNS 60 60 60}

	{DEFAULT_SCHEDULE}
	{DEFAULT_MUSIC_PLAYLIST}

	{PLACE_IMAGE scenery/signpost.png 6 16}
	{PLACE_IMAGE scenery/signpost.png 9 22}

	[event]
        name=prestart

        [set_variable]
            name=scenario_number
            value=42
        [/set_variable]

        {SCATTER_IMAGE (terrain=Dd) 5 scenery/monolith2.png}
        [item]
        	x=10
        	y=14-16
        	halo="terrain/desert-bridge-s-n.png"
        [/item]
        [tunnel]
        	[filter]
        	[/filter]
        	[source]
        		x,y=10,13
        	[/source]
        	[target]
        		x,y=10,17
        	[/target]
        [/tunnel]

        [objectives]
            side=1
            [objective]
                description= _ "Find and subdue the Dunefolk western village"
                condition=win
            [/objective]
            [objective]
                {ALTERNATIVE_OBJECTIVE_CAPTION}
                description= _ "Get rid of all aggressive Dunefolk"+{EARLY_FINISH_BONUS_FOOTNOTE}
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Io"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=100
            [/gold_carryover]
        [/objectives]

        {LOI_RECALL_ALL 33 14}
    [/event]

    [side]
        type="Young Man LoI"
        id=Io
        name="Io"
        x=33
        y=14
        fog=no
        shroud=yes
        profile=portraits/Io.png
        side=1
