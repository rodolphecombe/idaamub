	[event]
		name=prestart

		#ifdef HARD
		[terrain]
			x=32,34
			y=14,14
			terrain=Dd
		[/terrain]
		#endif

		#ifdef EASY
		[terrain]
			x=31,35
			y=14,14
			terrain=Ce
		[/terrain]
		#endif
	[/event]

	[event]
		name=start
		[message]
			speaker=Io
			message=_"Looks like we have a little welcome committee up there. It reminds me of that time in the mine."
		[/message]
		[message]
			speaker=Io
			message=_"At least, it must mean that we are getting close to the village."
		[/message]
		[message]
			speaker=Io
			message=_"Our mission is to subdue it and then to continue our journey to Idaamub's castle. Let's go."
		[/message]
		[message]
			speaker=Ubidaiubua
			message=_"Don't forget that we also need to find my cousin."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			x=6
			y=16
		[/filter]

		[message]
			speaker=narrator
			image="scenery/signpost.png"
			message= _ "North: Fire Cliffs
East: Of's Fortress"
		[/message]

		[allow_undo]
		[/allow_undo]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			x=9
			y=22
		[/filter]

		[message]
			speaker=narrator
			image="scenery/signpost.png"
			message= _ "North: Of's Fortress
South-East: Fire Cliffs, Idaamub's Castle"
		[/message]

		[allow_undo]
		[/allow_undo]
	[/event]

	[event]
		name=sighted
		[filter]
			type=Wyvern Rider
		[/filter]

		[filter_second]
			side=1
		[/filter_second]
		[message]
			speaker=second_unit
			message=_"What's that? It looks like there is someone on that Wyvern."
		[/message]
		[message]
			id="Rboekmocqu","Skepf","Teumiuxe"
			message=_"I heard that some of the Dunefolk are brave, or mad, enough to try to tame Wyverns. It looks like this one succeeded."
		[/message]
	[/event]

	[event]
		name=enter_hex
		[filter]
			side=1
		[/filter]
		[filter_condition]
			[have_location]
				terrain=Xoi
				[filter_vision]
					side=1
				[/filter_vision]
			[/have_location]
		[/filter_condition]
		[message]
			speaker=unit
			message=_"This must be the village. Now let's find the entrance."
		[/message]
		[cancel_action]
		[/cancel_action]
	[/event]

	[event]
		name=enter_hex
		[filter]
			side=1
		[/filter]
		[filter_condition]
			[have_location]
				x,y=14,25
				[filter_vision]
					side=1
				[/filter_vision]
			[/have_location]
		[/filter_condition]
		[message]
			speaker=unit
			message=_"Here is the entrance."
		[/message]
		[message]
			speaker=Io
			message=_"This is weird, the portal is open, there is no one guarding it and I see no one on the wall."
		[/message]
		[message]
			speaker=Io
			message=_"Let's hope it is because they had sent every soldier out to stop us from arriving to the village."
		[/message]
		[cancel_action]
		[/cancel_action]
	[/event]

	[event]
		name=enter_hex
		first_time_only=no
		[filter]
			side=1
			x=14
			y=25
		[/filter]
		[if]
			[variable]
				name=unit.variables.hero
				equals=yes
			[/variable]
			[then]
				[message]
					speaker=unit
					message= _ "Let's enter the village."
				[/message]
				[message]
					speaker=Io
					message= _ "I hope it is not a trap."
				[/message]
				{END_FOOD}
				[endlevel]
					bonus=no
					result=victory
					{NEW_GOLD_CARRYOVER 100}
				[/endlevel]
			[/then]
			[else]
				[message]
					speaker=Io
					message= _ "Wait for us! We are still fighting the Dunefolk here!"
				[/message]
				{MOVE_UNIT x,y=14,25 14 24}
			[/else]
		[/if]
	[/event]

	[event]
		name=die
		first_time_only=no
		[filter]
			side=2
		[/filter]
		[if]
			[have_unit]
				side=2
			[/have_unit]
			[else]
				[message]
					speaker=second_unit
					message= _ "I don't see any other Dunefolk around here. He must have been the last one."
				[/message]
				[message]
					speaker=unit
					message= _ "Let's enter the village."
				[/message]
				[message]
					speaker=Io
					message= _ "I hope it is not a trap."
				[/message]
				{END_FOOD}
				[endlevel]
					bonus=yes
					result=victory
					{NEW_GOLD_CARRYOVER 100}
				[/endlevel]
			[/else]
		[/if]
	[/event]

	[event]
		name=time over
		[message]
			speaker=Io
			message=_"Dunefolk are indeed as good fighters as blacksmith. I don't think we will be able to reach the village."
		[/message]
	[/event]

	{DROPS 20 0 (bow, xbow, staff,sword,polearm,mace) yes 2,3}

	{DISABLE_NEGATIVE_INCOME 1}

	{GLOBAL_EVENTS}
[/scenario]