#textdomain wesnoth-loi
[scenario]
	id="43_Western_Village"
	name= _ "Western Village"
	map_data="{~add-ons/Legends_of_Idaamub/maps/43_Western_Village.map}"
	victory_when_enemies_defeated=no
	#next_scenario=43_Western_Village

	{DEFAULT_SCHEDULE}
	{DEFAULT_MUSIC_PLAYLIST}

	[event]
        name=prestart

        [set_variable]
            name=scenario_number
            value=43
        [/set_variable]

        {VARIABLE faiq_talked 0}

        [objectives]
            side=1
            [objective]
                description= _ "Find and subdue the Dunefolk western village's leader"
                [show_if]
                	[variable]
                		name=faiq_talked
                		equals=0
                	[/variable]
                [/show_if]
                condition=win
            [/objective]
            [objective]
                description= _ "Leave the village"
                [show_if]
                	[variable]
                		name=faiq_talked
                		equals=1
                	[/variable]
                [/show_if]
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Io"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}
            [note]
                red,blue,green=0,255,255
                description= _"<b>This is currently the last scenario. It is advised not to sell items in it as you will have to replay the scenario when the next chapter will be out.</b>"
            [/note]
            [gold_carryover]
                bonus=yes
                carryover_percentage=100
            [/gold_carryover]
        [/objectives]

        {LOI_RECALL_ALL 21 4}
    [/event]

    [side]
        type="Young Man LoI"
        id=Io
        name="Io"
        x=21
        y=4
        fog=no
        shroud=yes
        profile=portraits/Io.png
        side=1
		defeat_condition=no_units_left
        canrecruit=yes
        controller=human
        team_name=heroes
        user_team_name=_"Heroes"
    [/side]

    [side]
		fog=no
		hidden=no
		no_leader=no
		shroud=no
		side=2
		team_name=heroes,dunefolk
		user_team_name={STR_DUNEFOLK}
		ai_algorithm=idle_ai
		[unit]
			canrecruit=yes
			id=trader
			name="Faiq"
			type="Dune Paragon"
			x=6
			y=22
		[/unit]
		[unit]
			id=fanatic_1
			name="Taldamam"
			side=2
			type="Dune Windbolt"
			x=1
			y=5
		[/unit]
		[unit]
			id=fanatic_2
			name="ʿAjad"
			type="Dune Harrier"
			x=1
			y=4
		[/unit]
		[unit]
			id=fanatic_3
			name="Arij al-Fadl"
			type="Dune Harrier"
			x=2
			y=4
		[/unit]
		[unit]
			id=fanatic_4
			name="Imdaas"
			type="Dune Blademaster"
			x=3
			y=4
		[/unit]
		[unit]
			id=fanatic_5
			name="Qazuq ibnSud"
			type="Dune Blademaster"
			x=3
			y=5
		[/unit]
	[/side]

	[side]
		fog=no
		hidden=yes
		no_leader=yes
		shroud=no
		side=3
		team_name=dunefolk
		user_team_name=_"Fanatics"
	[/side]

	[event]
		name=prestart

		{SCATTER_IMAGE (terrain=Rrd) 5 scenery/monolith3.png}
		{SCATTER_UNITS 25 "Dune Blademaster,Dune Windbolt,Dune Spearmaster,Dune Firetrooper,Dune Harrier" 0 (
	        terrain=Rrd,Cd

	        [not]
	            [filter]
	            [/filter]
	        [/not]
	    ) (
	        side=2
	        generate_name=yes
	        random_traits=yes
	    )}
	[/event]

	[event]
		name=start
		[message]
			speaker=Io
			message=_"They are bowing before us. They do not seem to want to attack us."
		[/message]
		[message]
			id=Teumiuxe,Csia,Rboekmocqu,Skepf
			message=_"Be careful, they could be faking it."
		[/message]
		[message]
			speaker=Io
			message=_"Anyway, we need to find the leader of the village and have him to surrender. Then we will go to Idaamub's castle."
		[/message]
		[message]
			speaker=Ubidaiubua
			message=_"Don't forget that we also need to find my cousin. I am sure she must be there."
		[/message]
		[message]
			speaker=Io
			message=_"I hope we won't have to fight here. It would be difficult to fight against the dunefolk inside their own village."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				id=fanatic_1,fanatic_2,fanatic_3,fanatic_4,fanatic_5
			[/filter_adjacent]
		[/filter]
		[modify_unit]
			[filter]
				id=fanatic_1,fanatic_2,fanatic_3,fanatic_4,fanatic_5
			[/filter]
			side=3
		[/modify_unit]
		[message]
			speaker=unit
			message=_"Those guys don't look friendly."
		[/message]
	[/event]

	[event]
		name=moveto,faiq_talk
		first_time_only=no
		[filter]
			side=1
			[filter_adjacent]
				id=trader
			[/filter_adjacent]
		[/filter]
		[store_gold]
			side=1
			variable=gold
		[/store_gold]
		{VARIABLE is_on_shop yes}
		[set_variable]
			name=x1
			value=$unit.x
		[/set_variable]
		[set_variable]
			name=y1
			value=$unit.y
		[/set_variable]
		[message]
			speaker=trader
			message=_"Hello."
			[option]
				message=_"Who are you?"
				[command]
					[message]
						speaker=Faiq
						message=_"I'm Faiq, Paragon of the Western Village."
					[/message]
					[fire_event]
						name=faiq_talk
						[primary_unit]
							x,y=$x1,$y1
						[/primary_unit]
					[/fire_event]
				[/command]
			[/option]
			[option]
				message=_"Recall your men and surrender!"
				[command]
					[message]
						speaker=trader
						message=_"Peace! We are all victims of these horrible Ocks!"
					[/message]
					[message]
						speaker=Io
						message=_"What do you mean?"
					[/message]
					[message]
						speaker=trader
						message=_"They have been hunting us down for centuries to eradicate us."
					[/message]
					[fire_event]
						name=faiq_talk
						[primary_unit]
							x,y=$x1,$y1
						[/primary_unit]
					[/fire_event]
				[/command]
			[/option]
			[option]
				message=_"Why are you siding with the Ocks?"
				[command]
					[message]
						speaker=trader
						message=_"When they reappeared, our generation of warriors had just hatched. It was no match against the old hexes the Ocks were using. "
					[/message]
					[message]
						speaker=trader
						message=_"To survive we concluded an... ill-advised alliance. We would like to redeem ourselves. "
					[/message]
					[message]
						speaker=trader
						message=_"As a proof of good intentions, I offer you a barter."
					[/message]
					[fire_event]
						name=faiq_talk
						[primary_unit]
							x,y=$x1,$y1
						[/primary_unit]
					[/fire_event]
				[/command]
			[/option]
			[option]
				message=_"Tell us what the Ock's plan is."
				[command]
					[message]
						speaker=trader
						message=_"The Ocks want to seize hold of a secret room they intend to find in Idaamub's castle."
					[/message]
					[message]
						speaker=trader
						message=_"You need to be quick if you want to prevent them from doing so."
					[/message]
					{VARIABLE faiq_talked 1}
					[show_objectives]
					[/show_objectives]
					[fire_event]
						name=faiq_talk
						[primary_unit]
							x,y=$x1,$y1
						[/primary_unit]
					[/fire_event]
				[/command]
			[/option]
			[option]
				message=_"Trade."
				[command]
					[fire_event]
						name=faiq_shop
						[primary_unit]
							x,y=$x1,$y1
						[/primary_unit]
					[/fire_event]
				[/command]
			[/option]
			[option]
				#textdomain wesnoth-lib
				message=_"Leave"
				#textdomain wesnoth-loi
				[command]
					{CLEAR_VARIABLE gold}
					[return]
					[/return]
				[/command]
			[/option]
		[/message]
	[/event]

