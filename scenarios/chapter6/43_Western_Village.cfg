	[event]
		name=buy_food
		first_time_only=no
		#ifndef EASY
		[if]
			[have_unit]
				side=1
				type=Bay Horse, Great Horse
			[/have_unit]
			[then]
		#endif
				[message]
					speaker=trader
					message= _ "How much food do you need?"
					[option]
						message=_"Buy 1 food for $food_price| gold"
						[command]
							[if]
								[variable]
									name=gold
									greater_than_equal_to=$food_price
								[/variable]
								[else]
									[message]
										speaker=trader
										message= _ "You don't have enough money."
									[/message]
								[/else]
								[then]
									[gold]
										side=1
										amount=-$food_price
									[/gold]
									{VARIABLE_OP food_counter add 1}
									[message]
										speaker=Io
										message=_"We now have $food_counter| food."
									[/message]
									[command]
										[fire_event]
											name=buy_food
											[primary_unit]
												x,y=$x1,$y1
											[/primary_unit]
										[/fire_event]
									[/command]
								[/then]
							[/if]
						[/command]
					[/option]
					[option]
						message=_"Buy 5 food for $(5*$food_price) gold"
						[command]
							[if]
								[variable]
									name=gold
									greater_than_equal_to="$(5*$food_price)"
								[/variable]
								[else]
									[message]
										speaker=trader
										message= _ "You don't have enough money."
									[/message]
								[/else]
								[then]
									[gold]
										side=1
										amount="$(-5*$food_price)"
									[/gold]
									{VARIABLE_OP food_counter add 5}
									[message]
										speaker=Io
										message=_"We now have $food_counter| food."
									[/message]
									[command]
										[fire_event]
											name=buy_food
											[primary_unit]
												x,y=$x1,$y1
											[/primary_unit]
										[/fire_event]
									[/command]
								[/then]
							[/if]
						[/command]
					[/option]
					[option]
						message=_"Buy 10 food for $(10*$food_price) gold"
						[command]
							[if]
								[variable]
									name=gold
									greater_than_equal_to="$(10*$food_price)"
								[/variable]
								[else]
									[message]
										speaker=trader
										message= _ "You don't have enough money."
									[/message]
								[/else]
								[then]
									[gold]
										side=1
										amount="$(-10*$food_price)"
									[/gold]
									{VARIABLE_OP food_counter add 10}
									[message]
										speaker=Io
										message=_"We now have $food_counter| food."
									[/message]
									[command]
										[fire_event]
											name=buy_food
											[primary_unit]
												x,y=$x1,$y1
											[/primary_unit]
										[/fire_event]
									[/command]
								[/then]
							[/if]
						[/command]
					[/option]
					[option]
#textdomain wesnoth
						message={LOI_STR_BACK}
#textdomain wesnoth-loi
						[command]
							[fire_event]
								name=faiq_shop
								[primary_unit]
									x,y=$x1,$y1
								[/primary_unit]
							[/fire_event]
						[/command]
					[/option]
				[/message]
	#ifndef EASY
			[/then]
			[else]
				[message]
					speaker=trader
					message=_"Do you have something to transport it?"
				[/message]
				[message]
					speaker=Io
					message=_"Unfortunately, not."
				[/message]
				[message]
					speaker=trader
					message=_"Come back when you do then."
				[/message]
			[/else]
		[/if]
	#endif
	[/event]
	
	[event]
		name=exit_hex
		first_time_only=no
		[filter]
			side=1
			[filter_adjacent]
				id=trader
			[/filter_adjacent]
		[/filter]
		{VARIABLE is_on_shop no}
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			x=17-22
			y=15-27
		[/filter]
		[message]
			speaker=Io
			message=_"My friends, we have defeated the Dunefolk. That's a great victory."
		[/message]
		[message]
			speaker=Io
			message=_"We have also learnt what the Ocks will do next, which means we have a chance to stop them."
		[/message]
		[message]
			speaker=Io
			message=_"To do so, we now have to travel to Idaamub's castle, which was our destination anyway, and find out where this mysterious secret room is."
		[/message]
		[endlevel]
			bonus=no
			result=victory
			{NEW_GOLD_CARRYOVER 100}
		[/endlevel]
	[/event]

	{DISABLE_NEGATIVE_INCOME 1}

	{GLOBAL_EVENTS}
[/scenario]

