			[/filter_adjacent]
		[/filter]
		[message]
			x,y=4,11
			message=_"Go see captain Soimaql. Whatever intel you've got, he will be interested."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				x,y=7,9
			[/filter_adjacent]
		[/filter]
		[message]
			x,y=7,9
			message=_"Congrats on how you dealt with that Isut necromancer. He had been spreading terror in the region for several days. "
		[/message]
		[message]
			x,y=7,9
			message=_"Since last battle, he kept challenging us to a duel. We would have been crazy to accept."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				x,y=4,6
			[/filter_adjacent]
		[/filter]
		[message]
			x,y=4,6
			message=_"Shh! 'm waitin' fo' 'nother skull t'pop out of da moat, like they kept doin' da whole day."
		[/message]
		[message]
			x,y=4,6
			message=_"I dunno if I keep shootin' da same guy 'n' he keeps gettin' back up all da time or if there's lotta them in there."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				x,y=6,13
			[/filter_adjacent]
		[/filter]
		[message]
			x,y=6,13
			message=_"I don't know if those undead are dead for good, but anyway, you did a good job. Maybe I will finally be able to sleep a bit."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				x,y=10,19
			[/filter_adjacent]
		[/filter]
		[message]
			x,y=10,19
			message=_"Talkin' 'bout gratitude, da sergeant confiscated ma beer when I told him I saw the Ocks, 'n' when I talked 'bout it t'Soimaql, he assigned me t'fire prevention fo' a week.  I should rather've kept it closed."
		[/message]
		[message]
			x,y=10,19
			message=_"Anyway, if Isut's no Ock, I dunno what he's."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				x,y=8,13
			[/filter_adjacent]
		[/filter]
		[message]
			x,y=8,13
			message=_"I was ordered not to let anyone disturb the injured. Do quickly what you have to do with the mage or I will bawl you out."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				id=healer
			[/filter_adjacent]
		[/filter]
		[message]
			id=healer
			message=_"I sometimes wonder why I exhaust myself healing the injured. I put them back on their feet, and they come back to me in an even more deplorable state."
		[/message]
		[message]
			id=healer
			message=_" I have a few potions that could heal you, as well as a few magical trinkets taken to the enemy. "
		[/message]
	[/event]

