	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
				id="Soimaql"
			[/filter_adjacent]
		[/filter]
		[message]
			speaker=unit
			message=_"Excuse me, are you Captain Soimaql?"
		[/message]
		[message]
			speaker=Soimaql
			message=_"I am. Thank you for saving what is left of the Legion that was defending the fortress."
		[/message]
		[message]
			speaker=Soimaql
			message=_"One hundred and eighty-two dead… And all this because a dummy disobeyed orders!"
		[/message]
		[message]
			speaker=Io
			message=_"What do you mean?"
		[/message]
		[message]
			speaker=Soimaql
			message=_"A scout had noticed the Ocks in the wood several weeks ago, but he kept quiet from fear that the others may accuse him of seeing ghosts."
		[/message]
		[message]
			speaker=Io
			message=_"The Ocks?! Ain't they supposed to be all dead and buried for centuries?"
		[/message]
		[message]
			speaker=Soimaql
			message=_"Everybody believed those creatures had well and truly disappeared for three centuries."
		[/message]
		[message]
			speaker=Soimaql
			message=_"What’s for sure is that the Dunefolk that are helping the Ocks have nothing of specters."
		[/message]
		[message]
			speaker=Io
			message=_"The Dunefolk?! Ain't they supposed to be our allies?"
		[/message]
		[message]
			speaker=Soimaql
			message=_"So were the orcs not so long ago.
			If we take the Dunefolk village east, we will have half-won. 
We once again broke our teeth on the western Dunefolk village, but you can deal with it, if you want."
		[/message]
		[message]
			speaker=Io
			message=_"We will do what we can. We need to go east to Idaamub castle anyway."
		[/message]
		{VARIABLE talked_to_soimaql 1}
		[show_objectives]
		[/show_objectives]
	[/event]

