    [event]
        name=moveto
        first_time_only=no
        [filter]
            side=1
            x=4
            y=21
        [/filter]
        [if]
        	[have_unit]
        		id=Skepf
        		side=2
        	[/have_unit]
            [then]
                [fire_event]
                    name=Skepf_talk
                [/fire_event]
            [/then]
        [/if]
    [/event]

    [event]
        name=Skepf_talk
        first_time_only=no
        [message]
            speaker=unit
            message= _ "Hello"
            [option]
                message=_"Excuse me, but you look furious."
                [command]
                    [message]
                        speaker=Skepf
                        message= _ "For Of's sake, we got our hands back on a worthless pile of wood, so what? Has any of us seen the color of any gold coin since the beginning of this chaos? "
                    [/message]
                    [message]
                        speaker=Skepf
                        message= _ "Of course not! I'm fed up with spilling my blood for nothing."
                    [/message]
                    [fire_event]
                        name=Skepf_talk
                        [primary_unit]
                            x,y=$x1,$y1
                        [/primary_unit]
                    [/fire_event]
                [/command]
            [/option]
			[option]
				message=_"Can we help you with something?"
				[command]
                    [store_gold]
                        side=1
                        variable=gold
                    [/store_gold]
					[message]
						speaker=Skepf
						message= _ " gonna tell you... if you've 84250 gold for me, I follow you without turning back and you'll be able to tell that Skepf works for you. What do you think?"
                        [option]
                            message=_"Here is the gold."
                            [command]
                                [if]
                                    [variable]
                                        name=gold
                                        greater_than_equal_to=84250
                                    [/variable]
                                    [else]
                                        [message]
                                            speaker=Skepf
                                            message= _ "Who do you think I am?! I don't work for cheap!"
                                        [/message]
                                    [/else]
                                    [then]
                                        [gold]
                                            side=1
                                            amount=-84250
                                        [/gold]
                                        [modify_unit]
                                            [filter]
                                                id=Skepf
                                            [/filter]
                                            side=1
                                        [/modify_unit]
                                        [allow_recruit]
                                            side=1
                                            type=Dwarvish Steelclad
                                        [/allow_recruit]
                                        {VARIABLE party_members[$party_members.length].id Skepf}
                                        [message]
                                            speaker=Skepf
                                            message= _ "I think I'll like working for you."
                                        [/message]
                                        [message]
                                            speaker=Skepf
                                            message= _ "Deal! Skepf is your man!"
                                        [/message]
                                        [message]
                                            speaker=narrator
                                            message=_"You can now recruit dwarvish steelclads."
                                        [/message]
                                    [/then]
                                [/if]
                            [/command]
                        [/option]
                        [option]
                            message=_"Sorry, we don't have that much gold to spend."
                            [command]
                                 [message]
                                    speaker=Skepf
                                    message= _ "Well, well. "
                                [/message]
                                [message]
                                    speaker=Skepf
                                    message= _ "Do what you want, while WE slave away for that bloody kingdom! "
                                [/message]
                                [message]
                                    speaker=Skepf
                                    message= _ "Go rot in hell!"
                                [/message]
                            [/command]
                        [/option]
                        {CLEAR_VARIABLE gold}
                        [fire_event]
                            name=Skepf_talk
                            [primary_unit]
                                x,y=$x1,$y1
                            [/primary_unit]
                        [/fire_event]
                    [/message]
                [/command]
            [/option]
            [option]
                message=_"Leave"
            [/option]
        [/message]
    [/event]

