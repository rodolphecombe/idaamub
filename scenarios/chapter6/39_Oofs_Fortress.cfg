#textdomain wesnoth-loi
[scenario]
	id="39_Oofs_Fortress"
	name= _ "Oof's Fortress"
	map_data="{~add-ons/Legends_of_Idaamub/maps/39_Oofs_Fortress.map}"
	victory_when_enemies_defeated=no
	# next_scenario=38_Isut

	# {TURNS 40 40 40}

	{DEFAULT_SCHEDULE}
	{DEFAULT_MUSIC_PLAYLIST}

	[story]
		[part]
			story=_ "The greatest threat for Oof’s fortress disappeared with Isut death, but the serious danger of the reappearance of this ancient malevolent spirit seriously torments our hero."
		[/part]
	[/story]

	{PLACE_IMAGE scenery/signpost.png 5 10}

	[event]
        name=prestart

        [set_variable]
            name=scenario_number
            value=36
        [/set_variable]

        {VARIABLE talked_to_soimaql 0}

        [objectives]
            side=1
            [objective]
                description= _ "Talk to Captain Soimaql"
                [show_if]
                	[variable]
                		name=talked_to_soimaql
                		equals=0
                	[/variable]
                [/show_if]
                condition=win
            [/objective]
            [objective]
                description= _ "Leave Oof's fortress for the Hall of Skulls"
                [show_if]
                	[variable]
                		name=talked_to_soimaql
                		equals=1
                	[/variable]
                [/show_if]
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Io"
                condition=lose
            [/objective]

            [gold_carryover]
                bonus=yes
                carryover_percentage=100
            [/gold_carryover]
        [/objectives]

        {LOI_RECALL_ALL 3 11}
    [/event]

    [side]
