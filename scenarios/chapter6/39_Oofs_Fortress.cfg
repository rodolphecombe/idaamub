		[/filter]
		[message]
			x,y=4,10
			message=_"I was getting tired of smashing their heads all day long. They might calm down now that this Isut crawler is gone."
		[/message]
	[/event]

	[event]
		name=moveto
		[filter]
			side=1
			[filter_adjacent]
