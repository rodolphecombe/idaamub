#textdomain wesnoth-loi
[scenario]
	id="40_Hall_of_Skulls"
	name= _ "Hall of Skulls"
	map_data="{~add-ons/Legends_of_Idaamub/maps/40_Hall_of_Skulls.map}"
	victory_when_enemies_defeated=no
	# next_scenario=38_Isut

	# {TURNS 40 40 40}

	{DEFAULT_SCHEDULE}
	{DEFAULT_MUSIC_PLAYLIST}

	{PLACE_IMAGE scenery/switch.png 33 13}
	{ANIMATED_MAUSOLEUM 23 36}
	{ANIMATED_MAUSOLEUM 32 48}

	[event]
        name=prestart

        [set_variable]
            name=scenario_number
            value=40
        [/set_variable]

        {VARIABLE sarcophagus_1_opened 0}
        {VARIABLE sarcophagus_2_opened 0}

        [objectives]
            side=1
            [objective]
                description= _ "Exit the cave to the east"
                condition=win
            [/objective]
            [objective]
                {ALTERNATIVE_OBJECTIVE_CAPTION}
                description= _ "Get rid of all Dunefolk"+{EARLY_FINISH_BONUS_FOOTNOTE}
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Io"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=100
            [/gold_carryover]
        [/objectives]

        {LOI_RECALL_ALL 3 12}
    [/event]

