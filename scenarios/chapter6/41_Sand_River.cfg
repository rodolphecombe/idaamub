#textdomain wesnoth-loi
[scenario]
	id="41_Sand_River"
	name= _ "Sand River"
	map_data="{~add-ons/Legends_of_Idaamub/maps/41_Sand_River.map}"
	victory_when_enemies_defeated=no
	next_scenario=42_Desert_Bridges

	{TURNS 200 200 200}

	{DEFAULT_SCHEDULE}
	{DEFAULT_MUSIC_PLAYLIST}

	{PLACE_IMAGE scenery/signpost.png 43 17}

	[event]
        name=prestart

        [set_variable]
            name=scenario_number
            value=41
        [/set_variable]

        {SCATTER_IMAGE (terrain=Mdd^Xm
        [filter_adjacent_location]
        	terrain=Dd
        [/filter_adjacent_location]) 5 scenery/mine-abandoned.png}
        {SCATTER_IMAGE (terrain=Dd) 5 scenery/monolith1.png}

        [objectives]
            side=1
            [objective]
                description= _ "Progress to the east"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Io"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=100
            [/gold_carryover]
        [/objectives]

        {LOI_RECALL_ALL 3 10}
    [/event]

