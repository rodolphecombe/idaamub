#textdomain wesnoth-loi
[unit_type]
    id=Hell Boar LoI
    name= _ "Hell Boar"
    race=monster
    image="units/monsters/hellboar1.webp"
    profile="portraits/monsters/woodland_boar.webp"
    [standing_anim]
        start_time=0
            [frame]
                image=units/monsters/hellboar[1~4].webp:300
            [/frame]
    [/standing_anim]
    hitpoints=45
    movement_type=rodentfoot
    movement=9
    experience=100
    {AMLA_DEFAULT}
    level=2
    alignment=neutral
    advances_to=null
    undead_variation=boar
    cost=31
    usage=fighter
    description=_ "It is said that those boars were bread by the Ocks to be used as yoke for their wagons. Since those were vanquished, they found a place of residence in the Black Forest, where they compete with bears for food."
    die_sound=tusker-die.ogg
    {DEFENSE_ANIM "units/monsters/hellboar2.webp" "units/monsters/hellboar3.webp" tusker-hit.ogg}
    [defense]
        village=50
    [/defense]
    [attack]
        name=bite
        description=_"bite"
        icon=attacks/fangs-animal.png
        type=blade
        range=melee
        damage=8
        number=3
    [/attack]
    [attack]
        name=tusk
        description=_"tusk"
        icon=attacks/tusk.png
        type=pierce
        [specials]
            {WEAPON_SPECIAL_CHARGE}
        [/specials]
        range=melee
        damage=8
        number=2
    [/attack]
    [attack_anim]
        [filter_attack]
            name=bite
        [/filter_attack]
        {SOUND:HIT bite.ogg}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=tusk
        [/filter_attack]
        {SOUND:HIT_AND_MISS tusker-charge.ogg tusker-charge-miss.ogg}
    [/attack_anim]
[/unit_type]
